services:
  mysql:
    image: mysql:8.0
    container_name: modernweb-cms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-modernweb_cms}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Optional in dev: the app falls back to an in-memory cache without REDIS_URL.
  # Started on demand with `docker compose up -d redis`, always on in prod.
  redis:
    image: redis:7-alpine
    container_name: modernweb-cms-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

# Production lives in docker-compose.prod.yml, deliberately not a profile here:
# sharing this file meant the prod app booted against the dev database with dev
# passwords. See docs/DEPLOY.md.

volumes:
  mysql_data:
